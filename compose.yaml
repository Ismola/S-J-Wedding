services:
  wedding-web:
    container_name: s-j-wedding
    build:
      context: .
      dockerfile: Dockerfile
    image: s-j-wedding:latest
    expose:
      - "80"
    ports:
      - "8080:80"
    networks:
      - cloudflare_default
    restart: unless-stopped

networks:
  cloudflare_default:
    external: true
