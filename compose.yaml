services:
  wedding-web:
    container_name: s-j-wedding
    build:
      context: .
      dockerfile: Dockerfile
    image: s-j-wedding:latest
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-80}
      MONGO_URI: ${MONGO_URI:-mongodb://h0:27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-sj_wedding}
    expose:
      - "80"
    networks:
      - cloudflare_default
    restart: unless-stopped
    extra_hosts:
      - "h0:${H0}"

networks:
  cloudflare_default:
    external: true
